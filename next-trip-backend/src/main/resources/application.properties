# Application
spring.application.name=nexttrip-backend

# MongoDB (localhost)
spring.data.mongodb.uri=mongodb://localhost:27017/nexttrip
spring.data.mongodb.database=nexttrip

# Server
server.port=8080

# JWT (HS256 — au moins 32 caractères)
nexttrip.jwt.secret=${JWT_SECRET:dev-next-trip-jwt-secret-key-min-32-chars-required!!}
nexttrip.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# APIs externes (optionnel)
nexttrip.openweather.api-key=${OPENWEATHER_API_KEY:}
nexttrip.amadeus.api-key=${AMADEUS_API_KEY:}
nexttrip.amadeus.api-secret=${AMADEUS_API_SECRET:}

# CORS — origines front (Angular http://localhost:4200)
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:3000,http://localhost:5173}
