services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./next-trip-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongo:27017/next_trip
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-64-char-random-string!!}
      CORS_ORIGINS: http://localhost:4200,http://localhost
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      AMADEUS_API_KEY: ${AMADEUS_API_KEY:-}
      AMADEUS_API_SECRET: ${AMADEUS_API_SECRET:-}
    depends_on:
      - mongo

  frontend:
    build: ./next-trip-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
